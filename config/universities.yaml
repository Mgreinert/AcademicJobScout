# Universities to scrape directly, in addition to aggregators.
# Push to main and the next Monday run picks up your changes.

universities:

  # -------------------------------------------------------------------------
  # University of Washington — Academic Personnel jobs portal
  #
  # First run: Playwright reached the page (no 403) but parsed 0 postings.
  # The page lists each posting as an <a> linking to a position-details URL
  # with a job_id query param. We use the anchor itself as the posting unit.
  # -------------------------------------------------------------------------
  - name: University of Washington
    jobs_url: https://ap.washington.edu/ahr/academic-jobs/
    posting_selector: "a[href*='position-details']"
    title_selector: "a[href*='position-details']"
    link_selector: "a[href*='position-details']"
    must_match:
      - geography
      - asia
      - asian
      - political
      - border
      - anthropology
      - social
      - humanities
      - global
      - international
      - jackson school
    fetcher: playwright
    wait_for_selector: "a[href*='position-details']"
    notes: |
      Jackson School of International Studies is the best fit. If parse_empty
      again, run `python test_university.py "Washington" --raw` and inspect
      the actual HTML for the right selectors.

  # -------------------------------------------------------------------------
  # National University of Singapore — Academic Positions search page
  #
  # First run: wait_for_selector timed out -- the URL was wrong (a different
  # category page that didn't contain job links). Corrected URL below points
  # at the Academic and Research Positions search.
  # -------------------------------------------------------------------------
  - name: National University of Singapore
    jobs_url: https://careers.nus.edu.sg/NUS/go/Academic-and-Research-Positions/545744/
    posting_selector: "a.jobTitle-link, tr.data-row a"
    title_selector: "a.jobTitle-link, tr.data-row a"
    link_selector: "a.jobTitle-link, tr.data-row a"
    must_match:
      - geography
      - asia
      - asian
      - political
      - border
      - anthropology
      - social
      - humanities
      - global
    fetcher: playwright
    wait_for_selector: "a.jobTitle-link, tr.data-row, .job-title"
    notes: |
      SuccessFactors portal. If parse_empty, inspect raw HTML with:
      python test_university.py "NUS" --raw

  # -------------------------------------------------------------------------
  # Nanyang Technological University — now on Workday
  #
  # First run: 404 on old www.ntu.edu.sg URL. NTU has moved their careers
  # portal to Workday (ntu.wd3.myworkdayjobs.com). Workday uses stable
  # data-automation-id attributes that make scraping reliable once you
  # know the right ones.
  # -------------------------------------------------------------------------
  - name: Nanyang Technological University
    jobs_url: https://ntu.wd3.myworkdayjobs.com/Careers
    posting_selector: "li[data-automation-id='jobResult']"
    title_selector: "a[data-automation-id='jobTitle']"
    link_selector: "a[data-automation-id='jobTitle']"
    location_selector: "[data-automation-id='locations']"
    must_match:
      - geography
      - asia
      - asian
      - political
      - social
      - anthropology
      - humanities
      - global
    fetcher: playwright
    wait_for_selector: "a[data-automation-id='jobTitle']"
    notes: |
      Workday SPA. Some NTU schools post via Interfolio instead -- an
      Interfolio aggregator scout would catch those too (planned).

  # -------------------------------------------------------------------------
  # CUNY Graduate Center
  #
  # First run: 0 postings from cuny.jobs aggregator. The Graduate Center's
  # own page is cleaner and is the most relevant CUNY unit for Jasnea
  # (the Graduate Center is CUNY's research-focused school).
  # -------------------------------------------------------------------------
  - name: CUNY Graduate Center
    jobs_url: https://www.gc.cuny.edu/human-resources/employment-opportunities
    # Listings appear as anchor tags with "Job ID NNNNN" in the text.
    # We grab all anchors in the main content and rely on must_match to
    # filter out navigation links.
    posting_selector: "main a, article a, .field a"
    title_selector: "main a, article a, .field a"
    link_selector: "main a, article a, .field a"
    must_match:
      - geography
      - asia
      - asian
      - political
      - border
      - anthropology
      - humanities
      - urban
      - international
      - sociology
      - history
    fetcher: requests
    notes: |
      Graduate Center is CUNY's research-focused unit and the strongest
      fit. Hunter and Baruch can be added as separate entries later.
