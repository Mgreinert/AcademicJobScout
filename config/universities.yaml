# Universities to scrape directly, in addition to aggregators.
# Push to main and the next Monday run picks up your changes.

universities:

  # -------------------------------------------------------------------------
  # University of Washington — Academic Personnel jobs portal
  #
  # First run: Playwright reached the page (no 403) but parsed 0 postings.
  # The page lists each posting as an <a> linking to a position-details URL
  # with a job_id query param. We use the anchor itself as the posting unit.
  # -------------------------------------------------------------------------
  - name: University of Washington
    jobs_url: https://ap.washington.edu/ahr/academic-jobs/
    posting_selector: "li.ap-job-item"
    title_selector: "span.ap-job-title"
    link_selector: "a[href*='position-details']"
    location_selector: "span.ap-job-location"
    must_match:
      - geography
      - asia
      - asian
      - political
      - border
      - anthropology
      - social
      - humanities
      - global
      - international
      - jackson school
    fetcher: playwright
    wait_for_selector: "li.ap-job-item"
    notes: |
      AP page lists each posting as <li class="ap-job-item"> with title in
      span.ap-job-title and a "More info" anchor pointing to position-details.
      An "Apply now" anchor points to Interfolio for many but not all posts.
      Jackson School of International Studies is the best fit for Jasnea.

  # -------------------------------------------------------------------------
  # National University of Singapore — Academic Positions search page
  #
  # First run: wait_for_selector timed out -- the URL was wrong (a different
  # category page that didn't contain job links). Corrected URL below points
  # at the Academic and Research Positions search.
  # -------------------------------------------------------------------------
  - name: National University of Singapore
    jobs_url: https://careers.nus.edu.sg/services/rss/category/?catid=545744
    posting_selector: "item"
    title_selector: "title"
    link_selector: "link"
    must_match:
      - geography
      - asia
      - asian
      - political
      - border
      - anthropology
      - social
      - humanities
      - global
      - middle east
      - urban
      - history
      - international
    fetcher: rss
    notes: |
      NUS exposes an RSS feed for each careers category. 545744 catid is
      "Academic and Research Positions". Far more reliable than scraping
      the JS-rendered portal (no Playwright, no WAF risk). Selectors are
      required by the dataclass but unused for fetcher=rss — _parse_rss
      uses fixed RSS 2.0 conventions.

  # -------------------------------------------------------------------------
  # Nanyang Technological University — now on Workday
  #
  # First run: 404 on old www.ntu.edu.sg URL. NTU has moved their careers
  # portal to Workday (ntu.wd3.myworkdayjobs.com). Workday uses stable
  # data-automation-id attributes that make scraping reliable once you
  # know the right ones.
  # -------------------------------------------------------------------------
  - name: Nanyang Technological University
    jobs_url: https://ntu.wd3.myworkdayjobs.com/Careers
    posting_selector: "section[data-automation-id='jobResults'] li"
    title_selector: "a[data-automation-id='jobTitle']"
    link_selector: "a[data-automation-id='jobTitle']"
    must_match:
      - geography
      - asia
      - asian
      - political
      - social
      - anthropology
      - humanities
      - history
      - urban
      - global
    fetcher: playwright
    wait_for_selector: "section[data-automation-id='jobResults']"
    scroll_to_bottom: true
    notes: |
      Workday SPA, ~856 jobs across 43 pages. Page 1 only (~20 results).
      NTU is tech-heavy; humanities/social science hits will be rare —
      that's expected, not a bug. Anchor on data-automation-id, not
      auto-generated css-* class names. Wait on jobResults section (not
      individual title links) to avoid visibility timeouts.

  # -------------------------------------------------------------------------
  # CUNY Graduate Center
  #
  # First run: 0 postings from cuny.jobs aggregator. The Graduate Center's
  # own page is cleaner and is the most relevant CUNY unit for Jasnea
  # (the Graduate Center is CUNY's research-focused school).
  # -------------------------------------------------------------------------
  - name: CUNY Graduate Center
    jobs_url: https://www.gc.cuny.edu/human-resources/employment-opportunities
    posting_selector: "li[data-list-item-id]"
    title_selector: "a"
    link_selector: "a"
    must_match:
      - geography
      - asia
      - asian
      - political
      - border
      - anthropology
      - humanities
      - urban
      - international
      - sociology
      - history
      - philosophy
      - cultural
    fetcher: playwright
    wait_for_selector: "li[data-list-item-id]"
    notes: |
      Listings are <li data-list-item-id="..."> wrapping a single <a>.
      Link text is "Job ID NNNNN - <title>". Page aggregates Faculty,
      HEO, and Staff postings; must_match filters to academic-relevant.
      WAF blocks gc.cuny.edu from cloud IPs — Playwright from a home IP
      works, but this scout will likely fail on GitHub Actions. Long-term
      fix: find a CUNY RSS or pivot to cuny.jobs aggregator.
